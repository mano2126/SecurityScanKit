<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SecurityScanKit — API 클라이언트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;background:#F0F4F8;color:#0F172A;}
.layout{display:grid;grid-template-columns:380px 1fr;height:100vh;}

/* ── 사이드바 ── */
.sidebar{background:#0D1F3C;border-right:1px solid #1E3A5F;display:flex;flex-direction:column;overflow:hidden;}
.sb-header{padding:14px 16px;background:#0A1628;border-bottom:1px solid #1E3A5F;}
.sb-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:2px;}
.sb-sub{color:#546E7A;font-size:10px;}
.sb-url-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.sb-url-row label{font-size:10px;color:#546E7A;white-space:nowrap;}
.sb-url-row input{flex:1;padding:5px 9px;border-radius:5px;border:1px solid #1E3A5F;background:#112348;color:#93C5FD;font-size:12px;outline:none;}
.sb-search{padding:8px 12px;border-bottom:1px solid #1E3A5F;}
.sb-search input{width:100%;padding:6px 10px;border-radius:5px;border:1px solid #1E3A5F;background:#112348;color:#E2E8F0;font-size:12px;outline:none;}
.tbl-header{display:grid;grid-template-columns:52px 1fr 1fr;padding:6px 12px;background:#071020;border-bottom:1px solid #1E3A5F;}
.tbl-header span{font-size:9px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.08em;}
.sb-list{flex:1;overflow-y:auto;}
.sb-list::-webkit-scrollbar{width:4px;}
.sb-list::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:2px;}
.sb-section{padding:7px 12px 3px;font-size:9px;font-weight:700;color:#2563EB;letter-spacing:.1em;text-transform:uppercase;background:#081525;border-top:1px solid #1E3A5F;border-bottom:1px solid #0F2040;}
.api-row{display:grid;grid-template-columns:52px 1fr 1fr;padding:7px 12px;cursor:pointer;border-bottom:1px solid #0F1E30;transition:background .1s;align-items:center;}
.api-row:hover{background:#112348;}
.api-row.active{background:#1E3A6E;}
.method{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;text-align:center;display:inline-block;}
.GET{background:#0C3A2A;color:#86EFAC;}
.POST{background:#0C1A3A;color:#93C5FD;}
.PUT{background:#2A1A00;color:#FCD34D;}
.DELETE{background:#2A0A0A;color:#FCA5A5;}
.api-path{font-size:10px;color:#94A3B8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;font-family:monospace;}
.api-row.active .api-path{color:#CBD5E1;}
.api-desc{font-size:11px;color:#64748B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.api-row.active .api-desc{color:#93C5FD;}

/* ── 오른쪽 메인 ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:#F8FAFC;}
.tab-bar{background:#fff;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;overflow-x:auto;flex-shrink:0;min-height:42px;}
.tab-bar::-webkit-scrollbar{height:3px;}
.tab-bar::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:2px;}
.tab{display:flex;align-items:center;gap:5px;padding:0 13px;height:42px;cursor:pointer;border-right:1px solid #E2E8F0;white-space:nowrap;font-size:11px;color:#64748B;flex-shrink:0;transition:background .1s;}
.tab:hover{background:#F1F5F9;}
.tab.active{background:#fff;color:#0F172A;border-bottom:2px solid #2563EB;font-weight:600;}
.tab-x{color:#94A3B8;font-size:15px;margin-left:3px;border-radius:3px;padding:0 2px;line-height:1;}
.tab-x:hover{background:#E2E8F0;color:#0F172A;}
.panels-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94A3B8;}
.panel{flex:1;overflow-y:auto;padding:18px 22px;display:none;}
.panel.active{display:block;}
.panel-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #E2E8F0;}
.panel-path{font-size:14px;font-weight:600;color:#0F172A;font-family:monospace;}
.panel-desc-text{font-size:12px;color:#64748B;margin-top:3px;}
.form-label{font-size:10px;font-weight:700;color:#64748B;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.05em;}
.form-input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #E2E8F0;background:#F8FAFC;color:#0F172A;font-size:12px;outline:none;font-family:monospace;}
.form-input:focus{border-color:#2563EB;background:#fff;}
textarea.form-input{height:120px;resize:vertical;line-height:1.5;}
.url-hint{font-size:11px;color:#64748B;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:5px;padding:7px 10px;margin-bottom:12px;font-family:monospace;word-break:break-all;}
.url-hint span{color:#1D4ED8;font-weight:600;}
.param-row{display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:7px;align-items:center;}
.param-key{font-size:11px;color:#475569;font-weight:500;}
.btn-run{padding:9px 22px;background:#2563EB;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s;}
.btn-run:hover{background:#1D4ED8;}
.btn-run:disabled{background:#94A3B8;cursor:not-allowed;}
.result-area{margin-top:14px;}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.result-status{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.s-ok{background:#F0FDF4;color:#166534;border:1px solid #86EFAC;}
.s-err{background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5;}
.result-time{font-size:11px;color:#94A3B8;}
.result-body{background:#0F172A;border:1px solid #1E293B;border-radius:8px;padding:14px;overflow-x:auto;max-height:450px;overflow-y:auto;}
.result-body pre{font-family:'Consolas','Courier New',monospace;font-size:11px;color:#E2E8F0;white-space:pre-wrap;word-break:break-word;line-height:1.6;}
.copy-btn{padding:4px 12px;border-radius:5px;border:1px solid #E2E8F0;background:#fff;color:#475569;font-size:11px;cursor:pointer;}
.copy-btn:hover{background:#F1F5F9;}
.spin{width:13px;height:13px;border-radius:50%;border:2px solid #fff;border-top-color:transparent;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.hint-empty{font-size:14px;font-weight:500;margin-bottom:6px;}
.hint-sub{font-size:12px;opacity:.7;}
.form-group{margin-bottom:12px;}
</style>
</head>
<body>
<div class="layout">

<!-- ══════ 왼쪽 사이드바 ══════ -->
<div class="sidebar">
  <div class="sb-header">
    <div class="sb-title">🛡 SecurityScanKit</div>
    <div class="sb-sub">API 테스트 클라이언트 v1.0</div>
    <div class="sb-url-row">
      <label>서버 주소</label>
      <input id="base-url" value="http://localhost:8000" oninput="onBaseURL()"/>
    </div>
  </div>
  <div class="sb-search">
    <input id="api-search" placeholder="🔍  API 검색 (경로 / 설명 / 메서드)..." oninput="renderList(this.value)"/>
  </div>
  <div class="tbl-header">
    <span>메서드</span>
    <span>경로</span>
    <span>설명</span>
  </div>
  <div class="sb-list" id="api-list"></div>
</div>

<!-- ══════ 오른쪽 메인 ══════ -->
<div class="main">
  <div class="tab-bar" id="tab-bar">
    <div id="empty-tab-hint" style="padding:0 16px;font-size:12px;color:#94A3B8;display:flex;align-items:center;height:42px;">
      ← 왼쪽 목록에서 API를 클릭하면 탭이 열립니다
    </div>
  </div>
  <div class="panels-wrap" id="panels-wrap">
    <div class="empty-state" id="empty-state">
      <div style="font-size:40px;margin-bottom:14px;opacity:.3;">🔌</div>
      <div class="hint-empty">API를 선택하세요</div>
      <div class="hint-sub">왼쪽 목록에서 API를 클릭하면 이 화면에서 바로 테스트할 수 있습니다</div>
    </div>
  </div>
</div>
</div>

<script>
const APIS = [
  {id:'health',    method:'GET',  path:'/api/health',    desc:'서버 상태 확인',         section:'시스템',     params:[], body:null},
  {id:'dashboard', method:'GET',  path:'/api/dashboard', desc:'종합 대시보드 통계',     section:'시스템',     params:[], body:null},

  {id:'list-assets',    method:'GET',  path:'/api/assets',               desc:'전체 자산 목록 조회',     section:'자산 관리', params:[], body:null},
  {id:'add-asset',      method:'POST', path:'/api/assets',               desc:'자산 신규 등록',          section:'자산 관리', params:[], body:'{\n  "name": "운영 웹서버",\n  "ip": "172.17.230.121",\n  "asset_type": "웹서버",\n  "environment": "Production",\n  "department": "IT운영팀",\n  "manager": "홍길동",\n  "priority": "critical",\n  "scan_types": "port,web,ssl",\n  "http_port": 80,\n  "https_port": 443\n}'},
  {id:'get-asset',      method:'GET',  path:'/api/assets/:id',           desc:'자산 상세 + 취약점 조회', section:'자산 관리', params:[{name:'id',label:'Asset ID',ph:'UUID 입력'}], body:null},
  {id:'upload-assets',  method:'POST', path:'/api/assets/upload',        desc:'Excel로 자산 일괄 등록',  section:'자산 관리', params:[], body:null, isUpload:true},
  {id:'upload-history', method:'GET',  path:'/api/assets/upload/history',desc:'업로드 이력 조회',         section:'자산 관리', params:[], body:null},

  {id:'scan-start',   method:'POST', path:'/api/scan/start',       desc:'보안 점검 시작',             section:'점검 엔진', params:[], body:'{\n  "asset_ids": ["여기에 Asset ID 입력"],\n  "scan_types": "port,web,ssl"\n}'},
  {id:'scan-status',  method:'GET',  path:'/api/scan/status/:id',  desc:'점검 진행 상태 확인',        section:'점검 엔진', params:[{name:'id',label:'Job ID',ph:'점검 시작 후 받은 job_id'}], body:null},
  {id:'scan-history', method:'GET',  path:'/api/scan/history',     desc:'전체 점검 이력 조회',        section:'점검 엔진', params:[], body:null},

  {id:'findings',         method:'GET',  path:'/api/findings',             desc:'취약점 전체 목록',        section:'취약점', params:[{name:'severity',label:'심각도 필터',ph:'critical / high / medium / low'},{name:'status',label:'상태 필터',ph:'open / resolved'},{name:'repeat_only',label:'반복 취약점만',ph:'true'}], body:null},
  {id:'findings-stats',   method:'GET',  path:'/api/findings/stats',       desc:'취약점 통계 요약',        section:'취약점', params:[], body:null},
  {id:'findings-repeat',  method:'GET',  path:'/api/findings/repeat',      desc:'반복 발견 취약점 목록',   section:'취약점', params:[], body:null},
  {id:'findings-resolve', method:'POST', path:'/api/findings/:id/resolve', desc:'취약점 조치 완료 처리',   section:'취약점', params:[{name:'id',label:'Finding ID',ph:'취약점 UUID'}], body:'{\n  "resolved_by": "홍길동",\n  "note": "방화벽 차단 완료"\n}'},

  {id:'alerts',       method:'GET',  path:'/api/alerts',         desc:'알람 목록 조회',          section:'알람', params:[{name:'unread_only',label:'미읽음만 보기',ph:'true'}], body:null},
  {id:'alert-count',  method:'GET',  path:'/api/alerts/count',   desc:'미읽음 알람 건수 확인',   section:'알람', params:[], body:null},
  {id:'alert-read',   method:'POST', path:'/api/alerts/read',    desc:'알람 읽음 처리',          section:'알람', params:[], body:'["알람 ID 1", "알람 ID 2"]'},
  {id:'alert-config', method:'GET',  path:'/api/alerts/config',  desc:'알람 설정 목록 조회',     section:'알람', params:[], body:null},
  {id:'alert-update', method:'PUT',  path:'/api/alerts/config/:type', desc:'알람 설정 변경',      section:'알람', params:[{name:'type',label:'알람 유형',ph:'repeat_vuln / ssl_expiry ...'}], body:'{\n  "is_active": true,\n  "threshold_value": 2\n}'},

  {id:'cve',        method:'GET',  path:'/api/cve',         desc:'CVE 취약점 목록',         section:'인텔리전스', params:[{name:'days',label:'최근 N일',ph:'30'}], body:null},
  {id:'news',       method:'GET',  path:'/api/news',        desc:'보안 뉴스 피드',          section:'인텔리전스', params:[{name:'source',label:'출처 필터',ph:'KrCERT / KISA / CISA / NVD'}], body:null},
  {id:'news-fetch', method:'POST', path:'/api/news/fetch',  desc:'보안 뉴스 수동 수집 실행',section:'인텔리전스', params:[], body:null},

  {id:'compliance', method:'GET',  path:'/api/compliance',      desc:'규정별 준수율 현황',      section:'리포트', params:[], body:null},
  {id:'report-gen', method:'POST', path:'/api/report/generate', desc:'보안 리포트 생성',        section:'리포트', params:[{name:'report_type',label:'리포트 유형',ph:'executive / technical / excel'}], body:null},
];

const SECTIONS = ['시스템','자산 관리','점검 엔진','취약점','알람','인텔리전스','리포트'];
let tabs=[], activeTab=null, tabCnt=0;

function getBase(){ return document.getElementById('base-url').value.replace(/\/$/,''); }
function onBaseURL(){ tabs.forEach(t=>updURL(t.id)); }

// ── 목록 렌더링 ──────────────────────────────────────────────────
function renderList(filter){
  filter = (filter||'').toLowerCase();
  const list = document.getElementById('api-list');
  list.innerHTML = '';
  SECTIONS.forEach(sec => {
    const items = APIS.filter(a => a.section===sec &&
      (!filter || a.path.toLowerCase().includes(filter) || a.desc.includes(filter) || a.method.toLowerCase().includes(filter)));
    if(!items.length) return;
    const sh=document.createElement('div'); sh.className='sb-section'; sh.textContent=sec;
    list.appendChild(sh);
    items.forEach(api => {
      const row=document.createElement('div');
      row.className='api-row'+(tabs.find(t=>t.apiId===api.id&&t.id===activeTab)?' active':'');
      row.id='row-'+api.id;
      row.innerHTML=`<div><span class="method ${api.method}">${api.method}</span></div><div class="api-path" title="${api.path}">${api.path}</div><div class="api-desc" title="${api.desc}">${api.desc}</div>`;
      row.onclick=()=>openTab(api);
      list.appendChild(row);
    });
  });
}

// ── 탭 관리 ─────────────────────────────────────────────────────
function openTab(api){
  const ex=tabs.find(t=>t.apiId===api.id);
  if(ex){ activateTab(ex.id); return; }
  const id=++tabCnt;
  tabs.push({id,apiId:api.id,api,result:null});
  renderTabs(); activateTab(id);
}

function closeTab(id,e){
  e.stopPropagation();
  tabs=tabs.filter(t=>t.id!==id);
  document.getElementById('panel-'+id)?.remove();
  if(activeTab===id) activeTab=tabs.length?tabs[tabs.length-1].id:null;
  renderTabs();
  if(activeTab) activateTab(activeTab); else showEmpty();
}

function activateTab(id){
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  const panel=document.getElementById('panel-'+id);
  if(panel){ panel.classList.add('active'); }
  else { const t=tabs.find(t=>t.id===id); if(t) buildPanel(t); }
  document.getElementById('empty-state').style.display='none';
  document.querySelectorAll('.api-row').forEach(r=>r.classList.remove('active'));
  const t=tabs.find(t=>t.id===id);
  if(t) document.getElementById('row-'+t.apiId)?.classList.add('active');
}

function renderTabs(){
  const bar=document.getElementById('tab-bar');
  const hint=document.getElementById('empty-tab-hint');
  bar.innerHTML='';
  if(!tabs.length){ bar.appendChild(hint); hint.style.display='flex'; return; }
  hint.style.display='none';
  tabs.forEach(t=>{
    const el=document.createElement('div');
    el.className='tab'+(t.id===activeTab?' active':'');
    el.id='tab-'+t.id;
    el.innerHTML=`<span class="method ${t.api.method}" style="padding:1px 5px;font-size:9px;">${t.api.method}</span><span style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.api.desc}</span><span class="tab-x" onclick="closeTab(${t.id},event)">×</span>`;
    el.onclick=()=>activateTab(t.id);
    bar.appendChild(el);
  });
}

function showEmpty(){
  document.getElementById('empty-state').style.display='flex';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
}

// ── 패널 빌드 ────────────────────────────────────────────────────
function buildPanel(tab){
  const wrap=document.getElementById('panels-wrap');
  const api=tab.api;
  const panel=document.createElement('div');
  panel.className='panel active'; panel.id='panel-'+tab.id;

  let paramsHtml='';
  if(api.params?.length){
    paramsHtml='<div class="form-group"><label class="form-label">파라미터</label>';
    api.params.forEach(p=>{
      paramsHtml+=`<div class="param-row"><span class="param-key">${p.label}</span><input class="form-input" id="p-${tab.id}-${p.name}" placeholder="${p.ph||''}"/></div>`;
    });
    paramsHtml+='</div>';
  }

  let bodyHtml='';
  if(api.body!==null && api.method!=='GET'){
    bodyHtml=`<div class="form-group"><label class="form-label">Request Body (JSON)</label><textarea class="form-input" id="b-${tab.id}">${api.body||''}</textarea></div>`;
  }

  let uploadHtml='';
  if(api.isUpload){
    uploadHtml=`<div class="form-group"><label class="form-label">Excel 파일 선택</label><input type="file" accept=".xlsx,.xls" id="f-${tab.id}" class="form-input" style="padding:6px;cursor:pointer;"/><div class="param-row" style="margin-top:6px;"><span class="param-key">업로드자 이름</span><input class="form-input" id="u-${tab.id}" value="홍길동"/></div></div>`;
  }

  panel.innerHTML=`
    <div class="panel-header">
      <span class="method ${api.method}" style="padding:5px 10px;font-size:12px;">${api.method}</span>
      <div>
        <div class="panel-path">${api.path}</div>
        <div class="panel-desc-text">${api.desc}</div>
      </div>
    </div>
    <div class="url-hint">요청 URL: <span id="up-${tab.id}"></span></div>
    ${paramsHtml}${uploadHtml}${bodyHtml}
    <button class="btn-run" id="btn-${tab.id}" onclick="runAPI(${tab.id})">▶ 실행</button>
    <div class="result-area" id="res-${tab.id}" style="display:none;"></div>
  `;
  wrap.appendChild(panel);
  updURL(tab.id);
  api.params?.forEach(p=>{
    document.getElementById(`p-${tab.id}-${p.name}`)?.addEventListener('input',()=>updURL(tab.id));
  });
}

function buildPath(tab){
  let path=tab.api.path;
  tab.api.params?.filter(p=>path.includes(':'+p.name)).forEach(p=>{
    const v=document.getElementById(`p-${tab.id}-${p.name}`)?.value?.trim()||(':'+p.name);
    path=path.replace(':'+p.name,encodeURIComponent(v));
  });
  return path;
}
function buildQS(tab){
  const parts=[];
  tab.api.params?.filter(p=>!tab.api.path.includes(':'+p.name)).forEach(p=>{
    const v=document.getElementById(`p-${tab.id}-${p.name}`)?.value?.trim();
    if(v) parts.push(`${p.name}=${encodeURIComponent(v)}`);
  });
  return parts.join('&');
}
function updURL(tabId){
  const tab=tabs.find(t=>t.id===tabId); if(!tab) return;
  const el=document.getElementById('up-'+tabId); if(!el) return;
  let url=getBase()+buildPath(tab);
  const qs=buildQS(tab); if(qs) url+='?'+qs;
  el.textContent=url;
}

// ── API 실행 ────────────────────────────────────────────────────
async function runAPI(tabId){
  const tab=tabs.find(t=>t.id===tabId); if(!tab) return;
  const btn=document.getElementById('btn-'+tabId);
  const res=document.getElementById('res-'+tabId);
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> 실행 중...';
  res.style.display='block';
  res.innerHTML='<div style="color:#94A3B8;font-size:12px;padding:10px 0;display:flex;align-items:center;gap:8px;"><span class="spin" style="border-color:#2563EB;border-top-color:transparent;"></span> 요청 전송 중...</div>';
  const t0=Date.now();
  try{
    let url=getBase()+buildPath(tab);
    const qs=buildQS(tab); if(qs) url+='?'+qs;
    const opts={method:tab.api.method,headers:{}};
    if(tab.api.isUpload){
      const fi=document.getElementById('f-'+tabId);
      if(!fi?.files?.length){
        res.innerHTML='<div style="color:#EF4444;padding:10px;background:#FEF2F2;border-radius:6px;">파일을 선택해 주세요</div>';
        btn.disabled=false; btn.innerHTML='▶ 실행'; return;
      }
      const fd=new FormData();
      fd.append('file',fi.files[0]);
      fd.append('uploaded_by',document.getElementById('u-'+tabId)?.value||'admin');
      opts.body=fd;
    } else if(tab.api.body!==null && tab.api.method!=='GET'){
      const bv=document.getElementById('b-'+tabId)?.value?.trim();
      if(bv){
        try{ JSON.parse(bv); }
        catch(e){ res.innerHTML=`<div style="color:#EF4444;padding:10px;background:#FEF2F2;border-radius:6px;">JSON 형식 오류: ${e.message}</div>`; btn.disabled=false; btn.innerHTML='▶ 실행'; return; }
        opts.body=bv; opts.headers['Content-Type']='application/json';
      }
    }
    const r=await fetch(url,opts);
    const ms=Date.now()-t0;
    const txt=await r.text();
    let fmt=txt;
    try{ fmt=JSON.stringify(JSON.parse(txt),null,2); }catch(e){}
    tab.result=fmt;
    const ok=r.status>=200&&r.status<300;
    res.innerHTML=`
      <div class="result-header">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="result-status ${ok?'s-ok':'s-err'}">${r.status} ${ok?'OK':'Error'}</span>
          <span class="result-time">${ms}ms · ${fmt.length.toLocaleString()} chars</span>
        </div>
        <button class="copy-btn" onclick="navigator.clipboard.writeText(tabs.find(t=>t.id==${tabId})?.result||'')">📋 결과 복사</button>
      </div>
      <div class="result-body"><pre>${colorJSON(fmt)}</pre></div>`;
  }catch(e){
    res.innerHTML=`
      <div class="result-header"><span class="result-status s-err">Connection Error</span></div>
      <div class="result-body"><pre style="color:#F87171;">서버에 연결할 수 없습니다.\n\n확인사항:\n  1. CMD 창에서 uvicorn 실행 중인지 확인\n  2. 서버 주소: ${getBase()}\n  3. 방화벽 설정 확인\n\n오류 메시지: ${e.message}</pre></div>`;
  }
  btn.disabled=false; btn.innerHTML='▶ 실행';
}

// ── JSON 컬러링 ──────────────────────────────────────────────────
function colorJSON(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m=>{
      if(/^"/.test(m)) return /:$/.test(m)
        ? `<span style="color:#93C5FD;">${m}</span>`
        : `<span style="color:#86EFAC;">${m}</span>`;
      if(/true|false/.test(m)) return `<span style="color:#FDA4AF;">${m}</span>`;
      if(/null/.test(m)) return `<span style="color:#94A3B8;">${m}</span>`;
      return `<span style="color:#FDE047;">${m}</span>`;
    });
}

// ── 초기화 ───────────────────────────────────────────────────────
renderList();
openTab(APIS.find(a=>a.id==='health'));
</script>
